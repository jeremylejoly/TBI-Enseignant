<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartes de Belgique · LCMA</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --encre: #171717;
    --panneau: #FFFFFF;
    --fond: #EEF3F7;
    --mer: #D8ECF6;
    --trait: #171717;
    --accent: #2F6FAF;
    --fla: #FFE9A8;
    --wal: #F5C9B8;
    --bxl: #C9DDF2;
    --ger: #CDEBC9;
    --fleuve: #255a95;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nunito', sans-serif;
    background: #fcfbfa;
    background-image: radial-gradient(#e5e7eb 1.5px, transparent 1.5px);
    background-size: 24px 24px;
    color: var(--encre);
    height: 100vh;
    display: flex;
    padding: 16px;
    gap: 16px;
    overflow: hidden;
  }

  /* ── PANNEAU DE CONTRÔLE ── */
  .panneau {
    width: 280px;
    flex-shrink: 0;
    background: var(--panneau);
    border: 2px solid var(--encre);
    border-radius: 16px;
    box-shadow: 4px 4px 0px 0px var(--encre);
    padding: 20px 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .panneau h1 {
    font-family: 'Fredoka', sans-serif;
    font-size: 19px;
    font-weight: 800;
    text-align: center;
  }
  .panneau h1 span { color: var(--accent); }
  .bloc {
    background: #ffffff;
    border: 2px solid var(--encre);
    border-radius: 12px;
    padding: 12px;
    box-shadow: 2px 2px 0px 0px var(--encre);
  }
  .bloc-titre {
    font-family: 'Fredoka', sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--encre);
    border-bottom: 2px solid var(--encre);
    padding-bottom: 6px;
    margin-bottom: 10px;
  }
  .ligne { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; font-size: 14px; font-weight: 700; }
  .ligne label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .ligne input[type=checkbox] { width: 17px; height: 17px; accent-color: var(--accent); cursor: pointer; }
  .ligne input[type=radio] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  .abc {
    font-family: 'Fredoka', sans-serif;
    font-size: 11px;
    font-weight: 800;
    border: 2px solid var(--encre);
    border-radius: 6px;
    background: #fff;
    color: var(--encre);
    padding: 2px 6px;
    cursor: pointer;
    transition: all 0.1s ease;
  }
  .abc:hover {
    background: #f3f4f6;
  }
  .abc.on {
    background: var(--accent);
    border-color: var(--encre);
    color: #fff;
    box-shadow: 1px 1px 0px 0px var(--encre);
  }
  .btn {
    font-family: 'Fredoka', sans-serif;
    font-size: 14px;
    font-weight: 700;
    border: 2px solid var(--encre);
    border-radius: 10px;
    background: #fff;
    color: var(--encre);
    padding: 8px 12px;
    cursor: pointer;
    width: 100%;
    box-shadow: 2px 2px 0px 0px var(--encre);
    transition: all 0.1s ease;
  }
  .btn:hover {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0px 0px var(--encre);
  }
  .btn:active {
    transform: translate(1px, 1px);
    box-shadow: 1px 1px 0px 0px var(--encre);
  }
  .btn.actif { background: var(--encre); color: #fff; }
  .btn + .btn { margin-top: 7px; }
  .pastille { display: inline-block; width: 13px; height: 13px; border-radius: 4px; border: 1.5px solid rgba(42,51,64,.35); margin-right: 7px; vertical-align: -2px; }
  .legende { font-size: 13px; font-weight: 700; line-height: 1.9; }
  .credit { font-size: 10.5px; color: #97A4B3; line-height: 1.5; margin-top: auto; }

  /* ── CARTE ── */
  .carte-zone {
    flex: 1;
    position: relative;
    border: 2px solid var(--encre);
    border-radius: 16px;
    box-shadow: 4px 4px 0px 0px var(--encre);
    overflow: hidden;
    background: var(--mer);
  }
  svg { width: 100%; height: 100%; display: block; background: var(--mer); cursor: grab; }
  svg.deplace { cursor: grabbing; }
  svg.annote { cursor: crosshair; }
  .voisin { fill: #ECEAE3; stroke: #7C8F9E; stroke-width: 1.8; }
  .nom-pays { font-family: 'Nunito'; font-size: 18px; font-weight: 800; fill: #9AA3AE; letter-spacing: 2.5px; pointer-events: none; }
  .commune { fill: transparent; stroke: #8A6FA8; stroke-width: .7; stroke-dasharray: 3 2; }
  .commune-limite { fill: none; stroke: rgba(23, 23, 23, 0.25); stroke-width: 0.5; pointer-events: none; }
  .nom-commune { font-family: 'Nunito'; font-weight: 800; fill: #6B4F8A; text-anchor: middle; paint-order: stroke; stroke: rgba(255,255,255,.85); stroke-width: .3em; pointer-events: none; }
  .zone-ardenne { fill: rgba(140,110,70,.18); stroke: rgba(140,110,70,.4); stroke-width: 1; stroke-dasharray: 5 4; pointer-events: none; }
  .nom-relief { font-family: 'Nunito'; font-size: 15px; font-weight: 700; font-style: italic; fill: #8A6E46; letter-spacing: 1.5px; text-anchor: middle; paint-order: stroke; stroke: rgba(255,255,255,.75); stroke-width: 3px; pointer-events: none; }
  .sommet text { font-family: 'Nunito'; font-size: 13px; font-weight: 800; fill: #6B4A20; paint-order: stroke; stroke: rgba(255,255,255,.85); stroke-width: 3px; pointer-events: none; }
  /* ── Thème : régions naturelles & relief ── */
  .nom-regnat { font-family: 'Nunito'; font-weight: 800; font-variant: small-caps; fill: #FFFFFF; text-anchor: middle; letter-spacing: .8px; paint-order: stroke; stroke: rgba(42,51,64,.38); stroke-width: 2.6px; pointer-events: none; }
  .nom-relief-zone { font-family: 'Nunito'; font-weight: 800; font-size: 13.5px; fill: #7C6F99; letter-spacing: 2.2px; text-anchor: middle; text-transform: uppercase; paint-order: stroke; stroke: rgba(255,255,255,.6); stroke-width: 3px; pointer-events: none; }
  .nom-relief-zone.clair { fill: #F6F0E4; stroke: rgba(55,35,15,.45); }
  .nom-belgique { font-family: 'Nunito'; font-weight: 900; font-size: 22px; fill: #6B4A26; letter-spacing: 8px; text-anchor: middle; text-transform: uppercase; paint-order: stroke; stroke: rgba(255,255,255,.5); stroke-width: 4px; pointer-events: none; }
  .nom-belgique.clair { fill: #F6F0E4; stroke: rgba(55,35,15,.4); }
  .sommet-theme path { fill: #3D2A14; stroke: #FFF; stroke-width: 1; }
  .sommet-theme text { font-family: 'Nunito'; font-size: 12.5px; font-weight: 800; fill: #3D2A14; paint-order: stroke; stroke: rgba(255,255,255,.88); stroke-width: 3px; pointer-events: none; }
  .prov-sur-theme { fill: none; stroke: rgba(42,51,64,.65); stroke-width: 1.1; stroke-dasharray: 4 3; pointer-events: none; }
  .legende-mini { font-size: 12px; font-weight: 700; line-height: 1.65; }
  .quiz-bandeau {
    position: absolute; left: 50%; top: 14px; transform: translateX(-50%);
    background: #fff; color: var(--encre);
    border: 2px solid var(--encre);
    border-radius: 14px; padding: 12px 24px;
    font-size: 16px; font-weight: 800;
    font-family: 'Fredoka', sans-serif;
    display: flex; gap: 18px; align-items: center;
    box-shadow: 4px 4px 0px 0px var(--encre);
    max-width: calc(100% - 140px);
    z-index: 10;
  }
  #quiz-progression { font-size: 14px; opacity: .8; white-space: nowrap; }
  .flash-bon { animation: flashB .7s ease; }
  .flash-mauvais { animation: flashM .7s ease; }
  @keyframes flashB { 0%,100% { filter: none; } 30% { filter: brightness(1.15) drop-shadow(0 0 14px #4CAF50); } }
  @keyframes flashM { 0%,100% { filter: none; } 30% { filter: brightness(1.05) drop-shadow(0 0 14px #E8604C); } }
  .prov { stroke: var(--trait); stroke-width: 1.6; transition: filter .15s; }
  .prov:hover { filter: brightness(.94); }
  .fleuve-trace { fill: none; stroke: var(--fleuve); stroke-width: 4.5; stroke-linecap: round; stroke-linejoin: round; opacity: .9; }
  .nom-prov { font-family: 'Nunito'; font-size: 20px; font-weight: 900; fill: var(--encre); text-anchor: middle; paint-order: stroke; stroke: rgba(255,255,255,.85); stroke-width: 4px; pointer-events: none; }
  .nom-fleuve { font-family: 'Nunito'; font-size: 17px; font-weight: 800; fill: var(--fleuve); paint-order: stroke; stroke: rgba(255,255,255,.9); stroke-width: 4px; pointer-events: none; }
  .pt-ville { stroke: #fff; stroke-width: 2; }
  .nom-ville { font-family: 'Nunito'; font-size: 16px; font-weight: 800; fill: var(--encre); paint-order: stroke; stroke: rgba(255,255,255,.9); stroke-width: 4px; pointer-events: none; }
  .nom-mer { font-family: 'Nunito'; font-size: 19px; font-weight: 800; fill: #5D93B5; font-style: italic; pointer-events: none; }
  .badge-num circle { fill: #E8604C; stroke: #fff; stroke-width: 2.5; }
  .badge-num text { font-family: 'Nunito'; font-size: 17px; font-weight: 900; fill: #fff; text-anchor: middle; pointer-events: none; }

  /* ── Frontière nationale ── */
  .frontiere-belgique {
    fill: none;
    stroke: var(--encre);
    stroke-width: 3.5;
    stroke-linejoin: round;
    stroke-linecap: round;
    pointer-events: none;
  }

  .zoom-boutons { position: absolute; right: 14px; top: 14px; display: flex; flex-direction: column; gap: 6px; }
  .zoom-boutons button {
    width: 38px; height: 38px;
    font-size: 20px; font-weight: 700;
    font-family: 'Fredoka', sans-serif;
    border: 2px solid var(--encre); border-radius: 8px;
    background: #fff; cursor: pointer;
    box-shadow: 2px 2px 0px 0px var(--encre);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s ease;
  }
  .zoom-boutons button:hover {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0px 0px var(--encre);
  }
  .zoom-boutons button:active {
    transform: translate(1px, 1px);
    box-shadow: 1px 1px 0px 0px var(--encre);
  }
  .burger { display: none; }

  @media print {
    .panneau, .zoom-boutons { display: none !important; }
    body { height: auto; padding: 0; }
    svg { height: 96vh; background: #fff; }
  }
  @media (max-width: 760px) {
    body { padding: 8px; gap: 8px; }
    .panneau { position: absolute; z-index: 5; height: calc(100% - 16px); transform: translateX(-110%); transition: transform .2s; }
    .panneau.ouvert { transform: none; }
    .burger { display: block; position: absolute; left: 12px; top: 12px; z-index: 6;
      width: 44px; height: 44px; font-size: 20px; border: 2px solid var(--encre); border-radius: 10px; background: #fff;
      box-shadow: 2px 2px 0px 0px var(--encre); cursor: pointer; }
  }
</style>
</head>
<body>

<aside class="panneau" id="panneau">
  <h1>🇧🇪 Cartes de <span>Belgique</span></h1>

  <div class="bloc">
    <div class="bloc-titre">Fond de carte</div>
    <div class="ligne"><label><input type="radio" name="fond" value="regions" checked onchange="setFond(this.value)"> Couleurs par région</label></div>
    <div class="ligne"><label><input type="radio" name="fond" value="communautes" onchange="setFond(this.value)"> Couleurs par communauté</label></div>
    <div class="ligne"><label><input type="radio" name="fond" value="provinces" onchange="setFond(this.value)"> Couleurs par province</label></div>
    <div class="ligne"><label><input type="radio" name="fond" value="muette" onchange="setFond(this.value)"> Carte muette</label></div>
  </div>

  <div class="bloc" id="bloc-legende">
    <div class="bloc-titre">Légende</div>
    <div class="legende" id="legende"></div>
  </div>

  <div class="bloc">
    <div class="bloc-titre">Couches · noms <span style="font-weight:700;text-transform:none;">(Abc)</span></div>
    <div class="ligne">
      <label><input type="checkbox" id="c-voisins" checked onchange="maj()"> Pays voisins</label>
      <button class="abc on" id="n-voisins" onclick="basculeAbc(this)">Abc</button>
    </div>
    <div class="ligne">
      <label><input type="checkbox" id="c-prov" checked onchange="maj()"> Provinces</label>
      <button class="abc on" id="n-prov" onclick="basculeAbc(this)">Abc</button>
    </div>
    <div class="ligne">
      <label><input type="checkbox" id="c-chefs" checked onchange="maj()"> Chefs-lieux</label>
      <button class="abc on" id="n-chefs" onclick="basculeAbc(this)">Abc</button>
    </div>
    <div class="ligne">
      <label><input type="checkbox" id="c-villes" onchange="maj()"> Autres villes</label>
      <button class="abc" id="n-villes" onclick="basculeAbc(this)">Abc</button>
    </div>
    <div class="ligne">
      <label><input type="checkbox" id="c-fleuves" checked onchange="maj()"> Fleuves</label>
      <button class="abc on" id="n-fleuves" onclick="basculeAbc(this)">Abc</button>
    </div>
    <div class="ligne">
      <label><input type="checkbox" id="c-relief" onchange="maj()"> Relief & régions nat.</label>
      <button class="abc on" id="n-relief" onclick="basculeAbc(this)">Abc</button>
    </div>
    <div class="ligne">
      <label><input type="checkbox" id="c-communes" onchange="maj()"> Communes (prov. Liège)</label>
      <button class="abc on" id="n-communes" onclick="basculeAbc(this)">Abc</button>
    </div>
    <div class="ligne">
      <label><input type="checkbox" id="c-communes-all" onchange="maj()"> Communes (toute la Belgique)</label>
    </div>
  </div>




  <div class="bloc">
    <div class="bloc-titre">Mode interrogation</div>
    <button class="btn" id="btn-annoter" onclick="basculeAnnotation()">🔢 Placer des numéros</button>
    <button class="btn" onclick="effacerNumeros()">🧽 Effacer les numéros</button>
  </div>


  <button class="btn" onclick="window.print()">🖨️ Imprimer la carte</button>

  <div class="credit">Contours officiels (open data) · Cours d'eau Natural Earth · LCMA</div>
</aside>

<button class="burger" onclick="document.getElementById('panneau').classList.toggle('ouvert')">☰</button>

<main class="carte-zone">
  <svg id="carte" preserveAspectRatio="xMidYMid meet">
    <defs>
      <clipPath id="clipBE"></clipPath>
      <pattern id="pat-bilingue" width="20" height="20" patternTransform="rotate(45 0 0)" patternUnits="userSpaceOnUse">
        <rect width="10" height="20" fill="var(--fla)" />
        <rect x="10" width="10" height="20" fill="var(--wal)" />
      </pattern>
    </defs>
    <g id="g-voisins"></g>
    <g id="g-provinces"></g>
    <g id="g-germanophone" clip-path="url(#clipBE)"></g>

const COUL_PROV = ['#FFE2A8','#F5C9B8','#C9DDF2','#CDEBC9','#E7D4F2','#F9D9E8','#D2EFEA','#F4E3C2','#DAE4F7','#EFD9CC','#D9EAC8'];
const NOM_REGION = { fla: 'Région flamande', wal: 'Région wallonne', bxl: 'Région de Bruxelles-Capitale' };

const COMMUNES_GERMANOPHONES = ['Amel', 'Burg-Reuland', 'Büllingen', 'Bütgenbach', 'Eupen', 'Kelmis', 'Lontzen', 'Raeren', 'Sankt Vith'];
const NOM_COMMUNAUTE = {
  flamande: 'Communauté flamande',
  fwb: 'Fédération Wallonie-Bruxelles',
  germanophone: 'Communauté germanophone',
  bilingue: 'Région bilingue de Bruxelles-Capitale'
};
const COUL_COMMUNAUTE = {
  flamande: 'var(--fla)',
  fwb: 'var(--wal)',
  germanophone: 'var(--ger)',
  bilingue: 'repeating-linear-gradient(45deg, var(--fla), var(--fla) 4px, var(--wal) 4px, var(--wal) 8px)'
};

let fond = 'regions';
let modeAnnotation = false;
let numero = 1;
const [VB_X, VB_Y, VB_W, VB_H] = GEO.viewBox.split(' ').map(Number);
let vue = { x: VB_X, y: VB_Y, w: VB_W, h: VB_H };

const svg = document.getElementById('carte');
const $ = id => document.getElementById(id);
const visible = id => $(id).checked;
const abcOn = id => $(id).classList.contains('on');

function couleurProvince(p, i) {
  if (fond === 'muette') return '#FFFFFF';
  if (fond === 'regions') return COUL_REGION[p.region];
  if (fond === 'communautes') {
    if (p.nom === 'Liège') return 'none'; // Rendu transparent pour être remplacé par les communes
    if (p.region === 'fla') return 'var(--fla)';
    if (p.region === 'wal') return 'var(--wal)';
    if (p.region === 'bxl') return 'url(#pat-bilingue)';
  }
  return COUL_PROV[i % COUL_PROV.length];
}

function maj() {
  // Pays voisins (terre grisée sous les provinces)
  $('g-voisins').innerHTML = visible('c-voisins')
    ? GEO.voisins.map(v => `<path class="voisin" data-nom="${v.nom}" d="${v.path}"/>`).join('') +
      (abcOn('n-voisins') ? GEO.voisinsLabels.map(l =>
        `<text class="nom-pays" x="${l.x}" y="${l.y}" text-anchor="${l.ancre}">${l.nom}</text>`).join('') : '')
    : '';

  // Provinces (Bruxelles-Capitale dessinée en dernier pour ne pas être recouverte par le Brabant flamand)
  const provincesTriees = [...GEO.provinces].sort((a, b) => {
    if (a.nom === 'Bruxelles-Capitale') return 1;
    if (b.nom === 'Bruxelles-Capitale') return -1;
    return 0;
  });
  $('g-provinces').innerHTML = provincesTriees.map((p) => {
    const origIdx = GEO.provinces.indexOf(p);
    return `<path class="prov" data-nom="${p.nom}" d="${p.path}" fill="${couleurProvince(p, origIdx)}"
       stroke-opacity="${visible('c-prov') ? 1 : 0}"><title>${p.nom}</title></path>`;
  }).join('');

  // Communauté germanophone & Découpage précis par communes de Liège
  if (fond === 'communautes') {
    // On dessine l'ensemble des 84 communes de la province de Liège
    // Les 9 germanophones en vert découpé, les 75 francophones en rose fondu
    const showCommunes = visible('c-communes') || visible('c-communes-all');
    $('g-germanophone').innerHTML = GEO.communes.map(c => {
      const isGermanophone = COMMUNES_GERMANOPHONES.includes(c.nom);
      const fillVal = isGermanophone ? 'var(--ger)' : 'var(--wal)';
      const strokeVal = isGermanophone
        ? (showCommunes ? 'var(--trait)' : 'var(--ger)')
        : 'var(--wal)';
      const strokeW = isGermanophone ? '1.2' : '1.2';
      const titleText = isGermanophone ? `${c.nom} (Communauté germanophone)` : `${c.nom} (Fédération Wallonie-Bruxelles)`;
      return `<path class="prov" data-nom="${c.nom}" d="${c.path}" fill="${fillVal}" style="stroke: ${strokeVal} !important; stroke-width: ${strokeW}px !important;" stroke-linejoin="round"><title>${titleText}</title></path>`;
    }).join('');
    
    // Si la couche frontières de provinces est active, on dessine le contour global de Liège par-dessus
    if (visible('c-prov')) {
      const liegeProv = GEO.provinces.find(p => p.nom === 'Liège');
      $('g-germanophone').innerHTML += `<path d="${liegeProv.path}" fill="none" stroke="var(--trait)" stroke-width="1.6" stroke-opacity="1" pointer-events="none"></path>`;
    }
  } else {
    $('g-germanophone').innerHTML = '';
  }

  // Relief : zone Ardenne + régions naturelles + point culminant
  $('g-relief').innerHTML = visible('c-relief')
    ? `<path class="zone-ardenne" d="${GEO.relief.ardenne}"/>` +
      (abcOn('n-relief')
        ? GEO.relief.labels.map(l => `<text class="nom-relief" x="${l.x}" y="${l.y}">${l.nom}</text>`).join('') +
          `<g class="sommet"><path d="M${GEO.relief.sommet.x - 7} ${GEO.relief.sommet.y + 5} l7 -12 l7 12 Z" fill="#6B4A20"/>
           <text x="${GEO.relief.sommet.x - 12}" y="${GEO.relief.sommet.y + 3}" text-anchor="end">${GEO.relief.sommet.nom} · ${GEO.relief.sommet.alt}</text></g>`
        : `<g class="sommet"><path d="M${GEO.relief.sommet.x - 7} ${GEO.relief.sommet.y + 5} l7 -12 l7 12 Z" fill="#6B4A20"/></g>`)
    : '';

  // Communes de la province de Liège (noms visibles seulement en zoom)
  $('g-communes').innerHTML = visible('c-communes')
    ? GEO.communes.map(c => `<path class="commune" d="${c.path}"><title>${c.nom}</title></path>`).join('')
    : '';
  $('g-noms-communes').innerHTML = (visible('c-communes') && abcOn('n-communes'))
    ? GEO.communes.map(c => `<text class="nom-commune" x="${c.lx}" y="${c.ly}">${c.nom}</text>`).join('')
    : '';
  majNomsCommunes();

  // Communes de toute la Belgique
  $('g-communes-all').innerHTML = visible('c-communes-all')
    ? GEO.communesAll.map(c => `<path class="commune-limite" d="${c.path}"><title>${c.nom}</title></path>`).join('')
    : '';

  // Noms de provinces
  $('g-noms-prov').innerHTML = (visible('c-prov') && abcOn('n-prov'))
    ? GEO.provinces.map(p => p.nom === 'Bruxelles-Capitale'
        ? `<text class="nom-prov" style="font-size:12px" x="${p.lx}" y="${p.ly - 16}">Bruxelles-Cap.</text>`
        : `<text class="nom-prov" x="${p.lx}" y="${p.ly}">${p.nom}</text>`).join('')
    : '';

  // Fleuves
  $('g-fleuves').innerHTML = visible('c-fleuves')
    ? GEO.fleuves.map(f => f.paths.map(d => `<path class="fleuve-trace ${f.cl || ''}" d="${d}"/>`).join('')).join('')
    : '';
  $('g-noms-fleuves').innerHTML = (visible('c-fleuves') && abcOn('n-fleuves'))
    ? GEO.fleuves.map(f => {
        const d = f.paths[0];
        const pts = d.slice(1).split(' ').map(Number);
        const mid = Math.floor(pts.length / 4) * 2;
        return `<text class="nom-fleuve" x="${pts[mid] + 8}" y="${pts[mid + 1] - 6}">${f.nom}</text>`;
      }).join('')
    : '';

  // Villes
  let villesHtml = '';
  if (visible('c-chefs')) {
    villesHtml += GEO.chefsLieux.map(v =>
      `<rect class="pt-ville" x="${v.x - 5.5}" y="${v.y - 5.5}" width="11" height="11" fill="#B23A2B" transform="rotate(45 ${v.x} ${v.y})"/>` +
      (abcOn('n-chefs') ? `<text class="nom-ville" x="${v.x + 10}" y="${v.y + 5}">${v.nom}</text>` : '')).join('');
  }
  if (visible('c-villes')) {
    villesHtml += GEO.villes.map(v =>
      `<circle class="pt-ville" cx="${v.x}" cy="${v.y}" r="5" fill="#3E5870"/>` +
      (abcOn('n-villes') ? `<text class="nom-ville" style="font-size:14px" x="${v.x + 9}" y="${v.y + 5}">${v.nom}</text>` : '')).join('');
  }
  $('g-villes').innerHTML = villesHtml;

  // Mer du Nord
  $('g-mer').innerHTML = `<text class="nom-mer" transform="translate(80, 85) rotate(-25)">Mer du Nord</text>`;

  majLegende();
}

function majLegende() {
  let h = '';
  if (fond === 'regions') {
    h += Object.entries(NOM_REGION).map(([k, n]) =>
      `<div><span class="pastille" style="background:${COUL_REGION[k]}"></span>${n}</div>`).join('');
  }
  if (fond === 'communautes') {
    h += `<div><span class="pastille" style="background:var(--fla);"></span>Communauté flamande</div>`;
    h += `<div><span class="pastille" style="background:var(--wal);"></span>Communauté française</div>`;
    h += `<div><span class="pastille" style="background:var(--ger);"></span>Communauté germanophone</div>`;
    h += `<div><span class="pastille" style="background:repeating-linear-gradient(45deg, var(--fla), var(--fla) 4px, var(--wal) 4px, var(--wal) 8px);"></span>Région bilingue de Bruxelles-Capitale</div>`;
  }
  if (visible('c-chefs')) h += `<div><span class="pastille" style="background:#B23A2B;border-radius:2px;transform:rotate(45deg);"></span>Chef-lieu</div>`;
  if (visible('c-villes')) h += `<div><span class="pastille" style="background:#3E5870;border-radius:50%;"></span>Ville</div>`;
  if (visible('c-fleuves')) h += `<div><span class="pastille" style="background:var(--fleuve);height:5px;border:none;border-radius:3px;"></span>Fleuve</div>`;
  if (visible('c-relief')) h += `<div><span class="pastille" style="background:rgba(140,110,70,.25);"></span>Massif ardennais · ▲ sommet</div>`;
  if (visible('c-communes')) h += `<div><span class="pastille" style="background:#fff;border:1.5px dashed #8A6FA8;"></span>Communes (zoomer pour les noms)</div>`;
  $('legende').innerHTML = h || '<span style="color:#97A4B3;">Carte muette</span>';
  $('bloc-legende').style.display = '';
}

function setFond(f) { fond = f; maj(); }
function basculeAbc(btn) { btn.classList.toggle('on'); maj(); }

// ── Annotations numérotées ──
function basculeAnnotation() {
  modeAnnotation = !modeAnnotation;
  $('btn-annoter').classList.toggle('actif', modeAnnotation);
  svg.classList.toggle('annote', modeAnnotation);
}
function effacerNumeros() { $('g-badges').innerHTML = ''; numero = 1; }

svg.addEventListener('click', e => {
  if (!modeAnnotation || enDeplacement) return;
  const pt = pointSVG(e);
  $('g-badges').innerHTML +=
    `<g class="badge-num"><circle cx="${pt.x}" cy="${pt.y}" r="15"/><text x="${pt.x}" y="${pt.y + 6}">${numero++}</text></g>`;
});

// ── Zoom & déplacement (viewBox) ──
function appliqueVue() {
  svg.setAttribute('viewBox', `${vue.x} ${vue.y} ${vue.w} ${vue.h}`);
  majNomsCommunes();
}
// Les 84 noms de communes ne s'affichent qu'une fois suffisamment zoomé,
// avec une taille constante À L'ÉCRAN (recalculée selon le niveau de zoom)
function majNomsCommunes() {
  const g = $('g-noms-communes');
  g.style.display = vue.w < 380 ? '' : 'none';
  // ~12,5 px à l'écran quel que soit le zoom (taille exprimée en unités carte)
  g.style.fontSize = (vue.w * 0.0125).toFixed(2) + 'px';
}
function zoomer(facteur, cx, cy) {
  cx = cx ?? vue.x + vue.w / 2; cy = cy ?? vue.y + vue.h / 2;
  const w = Math.min(Math.max(vue.w * facteur, VB_W / 8), VB_W * 1.4);
  const h = w * VB_H / VB_W;
  vue = { x: cx - (cx - vue.x) * w / vue.w, y: cy - (cy - vue.y) * h / vue.h, w, h };
  appliqueVue();
}
function resetVue() { vue = { x: VB_X, y: VB_Y, w: VB_W, h: VB_H }; appliqueVue(); }
function pointSVG(e) {
  const p = new DOMPoint(e.clientX, e.clientY);
  return p.matrixTransform(svg.getScreenCTM().inverse());
}
svg.addEventListener('wheel', e => {
  e.preventDefault();
  const pt = pointSVG(e);
  zoomer(e.deltaY > 0 ? 1.15 : 0.87, pt.x, pt.y);
}, { passive: false });

let enDeplacement = false, glisse = false, depart = null;
svg.addEventListener('pointerdown', e => { glisse = true; enDeplacement = false; depart = pointSVG(e); });
svg.addEventListener('pointermove', e => {
  if (!glisse) return;
  const p = pointSVG(e);
  const dx = depart.x - p.x, dy = depart.y - p.y;
  if (Math.abs(dx) + Math.abs(dy) > 2) enDeplacement = true;
  if (enDeplacement) {
    vue.x += dx; vue.y += dy;
    appliqueVue();
    svg.classList.add('deplace');
  }
});
['pointerup', 'pointerleave'].forEach(ev => svg.addEventListener(ev, () => {
  glisse = false;
  svg.classList.remove('deplace');
  setTimeout(() => enDeplacement = false, 0);
}));

// ── MODE QUIZ AUTO-CORRIGÉ ──
let quiz = null;
const RAYON_VILLE = 22; // tolérance de clic sur un chef-lieu (unités carte)

function basculeQuiz() {
  if (quiz) { finirQuiz(true); return; }
  const cat = document.querySelector('input[name=quizcat]:checked').value;
  let pool = [];
  if (cat === 'provinces' || cat === 'melange')
    pool = pool.concat(GEO.provinces.map(p => ({ type: 'prov', cible: p.nom, question: 'Clique sur la province : ' + p.nom })));
  if (cat === 'chefs' || cat === 'melange')
    pool = pool.concat(GEO.chefsLieux.map(v => ({ type: 'chef', cible: v.nom, question: 'Clique sur la ville : ' + v.nom })));
  if (cat === 'pays' || cat === 'melange')
    pool = pool.concat(GEO.voisins.map(v => ({ type: 'pays', cible: v.nom, question: 'Clique sur le pays : ' + v.nom })));
  const n = Math.min(8, pool.length);
  quiz = {
    questions: pool.map(q => [Math.random(), q]).sort((a, b) => a[0] - b[0]).map(x => x[1]).slice(0, n),
    idx: 0, score: 0, cat,
    // mémorise l'état des noms pour le restaurer après
    abcAvant: { prov: abcOn('n-prov'), chefs: abcOn('n-chefs'), voisins: abcOn('n-voisins') }
  };
  // masque les noms de la catégorie interrogée (sinon c'est trop facile !)
  if (cat === 'provinces' || cat === 'melange') $('n-prov').classList.remove('on');
  if (cat === 'chefs' || cat === 'melange') $('n-chefs').classList.remove('on');
  if (cat === 'pays' || cat === 'melange') $('n-voisins').classList.remove('on');
  if (cat === 'chefs' || cat === 'melange') $('c-chefs').checked = true;
  if (cat === 'pays' || cat === 'melange') $('c-voisins').checked = true;
  modeAnnotation = false;
  $('btn-annoter').classList.remove('actif');
  svg.classList.remove('annote');
  $('btn-quiz').textContent = '✋ Arrêter le quiz';
  $('btn-quiz').classList.add('actif');
  $('quiz-bandeau').style.display = '';
  maj();
  resetVue();
  questionSuivante();
}

function questionSuivante() {
  const q = quiz.questions[quiz.idx];
  $('quiz-question').textContent = '🎯 ' + q.question;
  $('quiz-progression').textContent = (quiz.idx + 1) + '/' + quiz.questions.length + ' · ' + quiz.score + ' pt' + (quiz.score > 1 ? 's' : '');
}

function clicQuiz(e) {
  if (!quiz || enDeplacement) return;
  const q = quiz.questions[quiz.idx];
  let bon = false, elemCible = null;

  if (q.type === 'prov' || q.type === 'pays') {
    const sel = q.type === 'prov' ? '.prov' : '.voisin';
    const touche = document.elementsFromPoint(e.clientX, e.clientY).find(el => el.matches && el.matches(sel));
    let toucheNom = touche ? touche.dataset.nom : null;
    const isCommuneLiege = GEO.communes.some(c => c.nom === toucheNom);
    if (isCommuneLiege) {
      toucheNom = "Liège";
    }
    bon = !!touche && toucheNom === q.cible;
    elemCible = document.querySelector(`${sel}[data-nom="${q.cible}"]`);
  } else {
    const pt = pointSVG(e);
    const v = GEO.chefsLieux.find(c => c.nom === q.cible);
    bon = Math.hypot(pt.x - v.x, pt.y - v.y) <= RAYON_VILLE;
    elemCible = $('g-villes'); // flash du groupe à défaut d'élément unitaire
  }

  if (bon) quiz.score++;
  if (elemCible) {
    elemCible.classList.remove('flash-bon', 'flash-mauvais');
    void elemCible.getBoundingClientRect();
    elemCible.classList.add(bon ? 'flash-bon' : 'flash-mauvais');
  }
  $('quiz-question').textContent = bon ? '✅ Bravo !' : '❌ La bonne réponse était : ' + q.cible;

  setTimeout(() => {
    quiz.idx++;
    if (quiz.idx >= quiz.questions.length) finirQuiz(false);
    else questionSuivante();
  }, bon ? 900 : 1900);
}
svg.addEventListener('click', clicQuiz);

function finirQuiz(interrompu) {
  const { score, questions, abcAvant, cat } = quiz;
  if (!interrompu) {
    $('quiz-question').textContent = '🏁 Terminé : ' + score + ' / ' + questions.length + ' !';
    $('quiz-progression').textContent = '';
    enregistrerScoreLCMA(score, questions.length, 'carte-belgique-' + cat);
    setTimeout(() => { $('quiz-bandeau').style.display = 'none'; }, 4000);
  } else {
    $('quiz-bandeau').style.display = 'none';
  }
  // restaure les noms tels qu'ils étaient
  $('n-prov').classList.toggle('on', abcAvant.prov);
  $('n-chefs').classList.toggle('on', abcAvant.chefs);
  $('n-voisins').classList.toggle('on', abcAvant.voisins);
  $('btn-quiz').textContent = '🎯 Lancer le quiz';
  $('btn-quiz').classList.remove('actif');
  quiz = null;
  maj();
}

// ── INTÉGRATION LCMA ──
// À adapter à ton mécanisme habituel d'enregistrement des scores
// (Firestore 'scores' : playerName / activite / score / total).
function enregistrerScoreLCMA(score, total, activite) {
  try {
    window.parent.postMessage({ type: 'lcma-score', activite, score, total }, '*');
  } catch (e) {}
}

document.getElementById('clipBE').innerHTML = GEO.provinces.map(p => `<path d="${p.path}"/>`).join('');
resetVue();
maj();
</script>
