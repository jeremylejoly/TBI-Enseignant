<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Ombre néo-brutaliste caractéristique de LCML -->
    <filter id="brutalist-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="9" dy="9" stdDeviation="0" flood-color="#1E1E1E" flood-opacity="1" />
    </filter>
  </defs>

  <!-- Fond carré aux bords très arrondis (Bulle LCML) -->
  <rect x="5" y="5" width="502" height="502" rx="120" fill="#FAF6F0" stroke="#1E1E1E" stroke-width="6" filter="url(#brutalist-shadow)" />

  <!-- ========================================== -->
  <!-- TABLEAU 1: EN HAUT À GAUCHE (Tableau interactif) -->
  <!-- ========================================== -->
  <g id="box-top-left">
    <!-- Fond de la case (Lavender LCML) -->
    <rect x="41" y="41" width="210" height="210" rx="60" fill="#D6C8FF" stroke="#1E1E1E" stroke-width="4.5" />
    
    <!-- Dessin d'un tableau blanc d'école -->
    <!-- Cadre extérieur blanc du tableau -->
    <rect x="70" y="70" width="152" height="152" rx="8" fill="#FFFFFF" stroke="#1E1E1E" stroke-width="4.5" />
    <!-- Capteur/attache centrale -->
    <circle cx="146" cy="76" r="3.5" fill="#1E1E1E" />
    <!-- Ligne de quadrillage professeur temporaire -->
    <line x1="82" y1="146" x2="210" y2="146" stroke="#D6C8FF" stroke-width="3" stroke-dasharray="4 4" />
    <!-- Courbe dessinée par l'enseignant (Style graphique écolier) -->
    <path d="M 85 190 Q 120 100, 150 160 T 205 110" fill="none" stroke="#BFE3FF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Plumier / Porte-feutres en bas du tableau -->
    <rect x="108" y="214" width="76" height="6" rx="2" fill="#FFEAA0" stroke="#1E1E1E" stroke-width="3.5" />
  </g>

  <!-- ========================================== -->
  <!-- TABLEAU 2: EN HAUT À DROITE (Time Timer) -->
  <!-- ========================================== -->
  <g id="box-top-right">
    <!-- Fond de la case (Sky Blue LCML) -->
    <rect x="261" y="41" width="210" height="210" rx="60" fill="#BFE3FF" stroke="#1E1E1E" stroke-width="4.5" />
    
    <!-- Le Chronomètre Time Timer -->
    <!-- Boîtier du timer blanc -->
    <circle cx="366" cy="146" r="72" fill="#FFFFFF" stroke="#1E1E1E" stroke-width="4.5" />
    
    <!-- Portion de temps rouge écoulé (Wedge de 120° équivalent à 20 min) -->
    <!-- Calcul exact : centre (366, 146), rayon 67 -->
    <path d="M 366 146 L 366 79 A 67 67 0 0 1 424 180 Z" fill="#FF5252" stroke="#1E1E1E" stroke-width="1.5" />
    
    <!-- Graduation / Tiers de ticks sur le cadran -->
    <line x1="366" y1="77" x2="366" y2="84" stroke="#1E1E1E" stroke-width="4" stroke-linecap="round" />
    <line x1="435" y1="146" x2="428" y2="146" stroke="#1E1E1E" stroke-width="4" stroke-linecap="round" />
    <line x1="366" y1="215" x2="366" y2="208" stroke="#1E1E1E" stroke-width="4" stroke-linecap="round" />
    <line x1="297" y1="146" x2="304" y2="146" stroke="#1E1E1E" stroke-width="4" stroke-linecap="round" />
    
    <!-- Ticks secondaires -->
    <line x1="401" y1="85" x2="397" y2="92" stroke="#1E1E1E" stroke-width="2.5" />
    <line x1="427" y1="111" x2="421" y2="116" stroke="#1E1E1E" stroke-width="2.5" />
    <line x1="427" y1="181" x2="421" y2="176" stroke="#1E1E1E" stroke-width="2.5" />
    <line x1="401" y1="207" x2="397" y2="200" stroke="#1E1E1E" stroke-width="2.5" />
    <line x1="331" y1="207" x2="335" y2="200" stroke="#1E1E1E" stroke-width="2.5" />
    <line x1="305" y1="181" x2="311" y2="176" stroke="#1E1E1E" stroke-width="2.5" />
    <line x1="305" y1="111" x2="311" y2="116" stroke="#1E1E1E" stroke-width="2.5" />
    <line x1="331" y1="85" x2="335" y2="92" stroke="#1E1E1E" stroke-width="2.5" />

    <!-- Aiguille centrale noire -->
    <line x1="366" y1="146" x2="366" y2="105" stroke="#1E1E1E" stroke-width="4.5" stroke-linecap="round" />
    <!-- Bouton central -->
    <circle cx="366" cy="146" r="6" fill="#1E1E1E" />
  </g>

  <!-- ========================================== -->
  <!-- TABLEAU 3: EN BAS À GAUCHE (Semainier d'école) -->
  <!-- ========================================== -->
  <g id="box-bottom-left">
    <!-- Fond de la case (Mint Green LCML) -->
    <rect x="41" y="261" width="210" height="210" rx="60" fill="#A9F3D8" stroke="#1E1E1E" stroke-width="4.5" />
    
    <!-- Carnet d'organisation / Semainier -->
    <!-- Page du cahier blanc -->
    <rect x="70" y="295" width="152" height="130" rx="6" fill="#FFFFFF" stroke="#1E1E1E" stroke-width="4.5" />
    
    <!-- Spirales en fil de fer cahier en haut de la page -->
    <!-- Spirale 1 -->
    <path d="M 78 288 Q 75 282, 82 284 L 80 298" fill="none" stroke="#1E1E1E" stroke-width="3.5" stroke-linecap="round" />
    <!-- Spirale 2 -->
    <path d="M 106 288 Q 103 282, 110 284 L 108 298" fill="none" stroke="#1E1E1E" stroke-width="3.5" stroke-linecap="round" />
    <!-- Spirale 3 -->
    <path d="M 134 288 Q 131 282, 138 284 L 136 298" fill="none" stroke="#1E1E1E" stroke-width="3.5" stroke-linecap="round" />
    <!-- Spirale 4 -->
    <path d="M 162 288 Q 159 282, 166 284 L 164 298" fill="none" stroke="#1E1E1E" stroke-width="3.5" stroke-linecap="round" />
    <!-- Spirale 5 -->
    <path d="M 190 288 Q 187 282, 194 284 L 192 298" fill="none" stroke="#1E1E1E" stroke-width="3.5" stroke-linecap="round" />
    <!-- Spirale 6 -->
    <path d="M 212 288 Q 209 282, 216 284 L 214 298" fill="none" stroke="#1E1E1E" stroke-width="3.5" stroke-linecap="round" />

    <!-- Ligne d'en-tête rouge cahier -->
    <line x1="70" y1="315" x2="222" y2="315" stroke="#FF5252" stroke-width="2.5" />

    <!-- Colonnes de jours du semainier -->
    <!-- Jour 1 -->
    <line x1="108" y1="315" x2="108" y2="425" stroke="#1E1E1E" stroke-width="2.5" />
    <!-- Jour 2 -->
    <line x1="146" y1="315" x2="146" y2="425" stroke="#1E1E1E" stroke-width="2.5" />
    <!-- Jour 3 -->
    <line x1="184" y1="315" x2="184" y2="425" stroke="#1E1E1E" stroke-width="2.5" />
    
    <!-- Séparation horizontale des lignes -->
    <line x1="70" y1="365" x2="222" y2="365" stroke="#1E1E1E" stroke-width="1.5" stroke-dasharray="3 3" />

    <!-- Bloc d'activité coloré du Lundi (Lavender LCML) -->
    <rect x="112" y="322" width="30" height="36" rx="3" fill="#D6C8FF" stroke="#1E1E1E" stroke-width="1.5" />
    <!-- Bloc d'activité coloré du Mercredi (Yellow LCML) -->
    <rect x="188" y="372" width="30" height="46" rx="3" fill="#FFEAA0" stroke="#1E1E1E" stroke-width="1.5" />
  </g>

  <!-- ========================================== -->
  <!-- TABLEAU 4: EN BAS À DROITE (Outils de classe & Crayon) -->
  <!-- ========================================== -->
  <g id="box-bottom-right">
    <!-- Fond de la case (Yellow LCML) -->
    <rect x="261" y="261" width="210" height="210" rx="60" fill="#FFEAA0" stroke="#1E1E1E" stroke-width="4.5" />
    
    <!-- Groupe d'outils croisés ré-orientés pour l'équilibre -->
    <g transform="translate(366, 366) scale(1.1)">
      <!-- 1. LA RÈGLE D'ÉCOLIER (Inclinée à -30 degrés) -->
      <g transform="rotate(-30)">
        <rect x="-42" y="-12" width="84" height="24" rx="4" fill="#FFFFFF" stroke="#1E1E1E" stroke-width="4" />
        <!-- Graduations de la règle -->
        <line x1="-32" y1="-12" x2="-32" y2="-4" stroke="#1E1E1E" stroke-width="2.5" />
        <line x1="-22" y1="-12" x2="-22" y2="-7" stroke="#1E1E1E" stroke-width="2" />
        <line x1="-12" y1="-12" x2="-12" y2="-4" stroke="#1E1E1E" stroke-width="2.5" />
        <line x1="-2" y1="-12" x2="-2" y2="-7" stroke="#1E1E1E" stroke-width="2" />
        <line x1="8" y1="-12" x2="8" y2="-4" stroke="#1E1E1E" stroke-width="2.5" />
        <line x1="18" y1="-12" x2="18" y2="-7" stroke="#1E1E1E" stroke-width="2" />
        <line x1="28" y1="-12" x2="28" y2="-4" stroke="#1E1E1E" stroke-width="2.5" />
        <line x1="38" y1="-12" x2="38" y2="-7" stroke="#1E1E1E" stroke-width="2" />
      </g>
      
      <!-- 2. LE CRAYON SCOLAIRE (Croisé, incliné à 35 degrés) -->
      <g transform="rotate(35)">
        <!-- Corps principal jaune avec rainures -->
        <path d="M -9 35 L -9 -20 L 0 -36 L 9 -20 L 9 35 Z" fill="#A9F3D8" stroke="#1E1E1E" stroke-width="4" stroke-linejoin="round" />
        <!-- Zone en bois poncé sous la mine -->
        <path d="M -9 -20 L 0 -36 L 9 -20 Q 0 -15, -9 -20 Z" fill="#FAF6F0" stroke="#1E1E1E" stroke-width="3" />
        <!-- Pointe de graphite noire -->
        <path d="M -4.5 -28 L 0 -36 L 4.5 -28 Z" fill="#1E1E1E" />
        <!-- Gomme rose caractéristique -->
        <path d="M -9 35 C -9 43, 9 43, 9 35 Z" fill="#D6C8FF" stroke="#1E1E1E" stroke-width="4" />
        <!-- Bague métallique argentée -->
        <rect x="-9" y="27" width="18" height="6" fill="#FFFFFF" stroke="#1E1E1E" stroke-width="4" />
      </g>
    </g>
  </g>
</svg>
